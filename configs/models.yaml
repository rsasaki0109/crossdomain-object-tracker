# Model configurations for cross-domain object detection evaluation

models:
  yolov8n:
    name: YOLOv8 Nano
    backend: ultralytics
    weights: yolov8n.pt
    description: Fastest YOLOv8 variant, suitable for real-time inference.
    input_size: 640
    default_confidence: 0.25

  yolov8s:
    name: YOLOv8 Small
    backend: ultralytics
    weights: yolov8s.pt
    description: Small YOLOv8 variant balancing speed and accuracy.
    input_size: 640
    default_confidence: 0.25

  yolov8m:
    name: YOLOv8 Medium
    backend: ultralytics
    weights: yolov8m.pt
    description: Medium YOLOv8 variant for higher accuracy.
    input_size: 640
    default_confidence: 0.25

  yolov8l:
    name: YOLOv8 Large
    backend: ultralytics
    weights: yolov8l.pt
    description: Large YOLOv8 variant for high accuracy.
    input_size: 640
    default_confidence: 0.25

  yolov8x:
    name: YOLOv8 XLarge
    backend: ultralytics
    weights: yolov8x.pt
    description: Largest YOLOv8 variant for maximum accuracy.
    input_size: 640
    default_confidence: 0.25

  grounding-dino:
    name: Grounding DINO (Tiny)
    backend: transformers
    model_id: IDEA-Research/grounding-dino-tiny
    description: >-
      Open-vocabulary object detector using text prompts.
      Enables zero-shot detection of arbitrary object categories.
    input_size: 800
    default_box_threshold: 0.35
    default_text_threshold: 0.25
    domain_prompts:
      maritime: "boat . ship . buoy . person . kayak . dock . bird . water"
      autonomous_driving: "car . truck . bus . person . bicycle . motorcycle . traffic light . stop sign"
      driving: "car . truck . bus . person . bicycle . motorcycle . traffic light . stop sign"
      campus: "person . bicycle . bench . backpack . dog . skateboard . tree . building"
      indoor: "chair . table . couch . tv . book . bottle . plant . lamp . bed"
      indoor/construction: "wall . door . window . pipe . column . person . sign . equipment"
      outdoor/extreme: "car . truck . bus . person . bicycle . building . sign . pole"
      global/outdoor: "car . person . building . tree . sign . bicycle . animal . furniture"

  grounding-dino-base:
    name: Grounding DINO (Base)
    backend: transformers
    model_id: IDEA-Research/grounding-dino-base
    description: >-
      Larger Grounding DINO variant with higher accuracy.
      Better for complex scenes at the cost of slower inference.
    input_size: 800
    default_box_threshold: 0.35
    default_text_threshold: 0.25
